<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Hover Demo - Irworobongdo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #0a0a0a;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  .stage {
    position: relative;
    width: min(70vw, 600px);
    aspect-ratio: 2070 / 3070;
  }
  .layer {
    position: absolute;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s ease;
  }
  .scene {
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .scene img {
    display: block;
    width: 100%;
    height: 100%;
  }
  .tree {
    transform: translateY(0) scale(1);
    filter: drop-shadow(0 0 0 rgba(0,0,0,0));
  }
  .tree img {
    display: block;
    width: 100%;
    height: 100%;
  }
  .tree-left {
    left: 0%;
    top: 30.94%;
    width: 33.82%;
    height: 57.00%;
    transform-origin: 50% 80%;
  }
  .tree-right {
    left: 66.18%;
    top: 32.57%;
    width: 33.82%;
    height: 55.37%;
    transform-origin: 50% 80%;
  }
  .stage:hover .tree-left {
    transform: translate(-3%, -4%) scale(1.06) rotate(-1.5deg);
    filter: drop-shadow(10px 14px 18px rgba(0,0,0,0.6)) drop-shadow(0 0 24px rgba(255,245,225,0.2));
  }
  .stage:hover .tree-right {
    transform: translate(3%, -4%) scale(1.06) rotate(1.5deg);
    filter: drop-shadow(-10px 14px 18px rgba(0,0,0,0.6)) drop-shadow(0 0 24px rgba(255,120,80,0.2));
  }
  .hint {
    position: absolute;
    bottom: -40px;
    left: 0; right: 0;
    text-align: center;
    color: #777;
    font-family: -apple-system, sans-serif;
    font-size: 13px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="layer scene">
      <img src="assets/scene_line.webp" alt="배경">
    </div>
    <div class="layer tree tree-left">
      <img src="assets/tree_left_line.webp" alt="왼쪽 소나무">
    </div>
    <div class="layer tree tree-right">
      <img src="assets/tree_right_line.webp" alt="오른쪽 소나무">
    </div>
    <div class="hint">마우스를 올려보세요 (hover)</div>
  </div>
</body>
</html>
