<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Hover Demo - Color Comparison</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background: #e9e9e7;
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
  }
  body {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-start;
    justify-content: center;
    gap: 40px;
    padding: 60px 5%;
  }
  .panel {
    width: min(40vw, 420px);
  }
  .panel h2 {
    text-align: center;
    font-weight: 400;
    font-size: 16px;
    letter-spacing: 0.1em;
    color: #777;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .stage {
    position: relative;
    width: 100%;
    aspect-ratio: 1524 / 2511;
  }
  .stage.original .layer.scene img,
  .stage.original .tree img { filter: none; }

  .layer {
    position: absolute;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s ease;
  }
  .scene { inset: 0; width: 100%; height: 100%; }
  .scene img { display: block; width: 100%; height: 100%; }
  .tree img { display: block; width: 100%; height: 100%; }
  .tree {
    transform: translateY(0) scale(1);
    filter: drop-shadow(0 0 0 rgba(0,0,0,0));
  }
  .tree-left {
    left: 0%; top: 32.02%; width: 31.50%; height: 67.98%;
    transform-origin: 50% 80%;
  }
  .tree-right {
    left: 68.24%; top: 31.38%; width: 31.76%; height: 68.62%;
    transform-origin: 50% 80%;
  }
  .stage:hover .tree-left {
    transform: translate(-3%, -4%) scale(1.06) rotate(-1.5deg);
    filter: drop-shadow(12px 18px 24px rgba(0,0,0,0.35));
  }
  .stage:hover .tree-right {
    transform: translate(3%, -4%) scale(1.06) rotate(1.5deg);
    filter: drop-shadow(-12px 18px 24px rgba(0,0,0,0.35));
  }
  .panel.gray .stage { background: #f0f0ee; }
  .panel.sepia .stage { background: #f5ecd9; }
  .panel.original .stage { background: #0d1b3d; }

  .hint {
    margin-top: 14px;
    text-align: center;
    color: #aaa;
    font-size: 12px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

  <div class="panel original">
    <h2>Original</h2>
    <div class="stage original">
      <div class="layer scene"><img src="assets/scene_bg.webp" alt="원본 배경"></div>
      <div class="layer tree tree-left"><img src="assets/tree_left.webp" alt="원본 왼쪽 나무"></div>
      <div class="layer tree tree-right"><img src="assets/tree_right.webp" alt="원본 오른쪽 나무"></div>
    </div>
    <div class="hint">원본 색상</div>
  </div>

  <div class="panel gray">
    <h2>Gray Duotone</h2>
    <div class="stage">
      <div class="layer scene"><img src="assets/scene_bg_gray.webp" alt="그레이 배경"></div>
      <div class="layer tree tree-left"><img src="assets/tree_left_gray.webp" alt="그레이 왼쪽 나무"></div>
      <div class="layer tree tree-right"><img src="assets/tree_right_gray.webp" alt="그레이 오른쪽 나무"></div>
    </div>
    <div class="hint">immersive-g 사이트 배경톤 (연회색 ~ 짙은회색)</div>
  </div>

  <div class="panel sepia">
    <h2>Sepia / Cream</h2>
    <div class="stage">
      <div class="layer scene"><img src="assets/scene_bg_sepia.webp" alt="세피아 배경"></div>
      <div class="layer tree tree-left"><img src="assets/tree_left_sepia.webp" alt="세피아 왼쪽 나무"></div>
      <div class="layer tree tree-right"><img src="assets/tree_right_sepia.webp" alt="세피아 오른쪽 나무"></div>
    </div>
    <div class="hint">Chartogne-Taillet 빈티지 맵 톤 (브라운 ~ 크림)</div>
  </div>

</body>
</html>
