<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나랏말싸미 — 국립한글박물관</title>
  <link href="https://hangeul.pstatic.net/hangeul_static/css/maru-buri.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ==========================================
       SECTION 01 · HERO
       배경 PNG 1장 + 스크롤 텍스트 전환
  =========================================== -->
  <section class="s-hero" id="hero">

    <!-- 배경 PNG — Three.js 커스텀 셰이더 -->
    <div class="s-hero__bg">
      <canvas id="hero-canvas"></canvas>
    </div>

    <!-- 상단 바 -->
    <header class="top-bar">
      <div class="top-bar__logo">
        <!-- 로고 이미지 교체 예정 -->
        <img src="assets/images/logo.png" alt="국립한글박물관" class="top-bar__logo-img">
      </div>
      <button class="btn-expand" type="button" aria-label="메뉴 펼쳐보기">
        펼쳐보기
      </button>
    </header>

    <!-- 스크롤로 전환되는 텍스트 -->
    <div class="s-hero__copy">
      <p class="s-hero__line s-hero__line--1">한글의 시작은 글자가 아니었습니다!</p>
      <p class="s-hero__line s-hero__line--2">사람을 향한 <strong>마음</strong>이었습니다.</p>
    </div>

    <!-- 좌하단 로고 -->
    <div class="s-hero__logo-bottom">
      <img src="assets/images/logo-mark.png" alt="" class="s-hero__logo-mark" aria-hidden="true">
      <span class="s-hero__logo-name">국립한글박물관</span>
    </div>

  </section>

  <!-- ==========================================
       SECTION 02 · VIDEO REVEAL
       배경 동일 PNG + clip-path 마스크 확장
  =========================================== -->
  <section class="s-video" id="section-video">

    <!-- 배경 텍스처 (hero와 동일 PNG, CSS) -->
    <div class="s-video__bg"></div>

    <!-- 우상단 영상보기 버튼 -->
    <button class="btn-watch" type="button">영상보기</button>

    <!-- 마스크 컨테이너 — clip-path가 스크롤에 따라 확장 -->
    <div class="s-video__mask">
      <video
        class="s-video__player"
        src="assets/video/main-video.mp4"
        poster="assets/images/video-poster.png"
        autoplay
        muted
        loop
        playsinline
      ></video>
    </div>

  </section>

  <!-- Three.js (로컬) -->
  <script src="assets/js/three.min.js"></script>
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
