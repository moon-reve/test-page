<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Normal Map Light Demo - hero_bg_5</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #f0f0f0;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  #stage {
    width: min(90vw, 1200px);
    aspect-ratio: 1920 / 1080;
  }
  canvas { display: block; width: 100%; height: 100%; }
  .hint {
    position: fixed;
    bottom: 24px;
    left: 0; right: 0;
    text-align: center;
    color: #999;
    font-family: -apple-system, sans-serif;
    font-size: 13px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
  <div id="stage"></div>
  <div class="hint">마우스를 움직여보세요 (light follows cursor)</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from "three";

const stage = document.getElementById('stage');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

const camera = new THREE.PerspectiveCamera(30, stage.clientWidth / stage.clientHeight, 0.1, 100);
camera.position.set(0, 0, 4.2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(stage.clientWidth, stage.clientHeight);
stage.appendChild(renderer.domElement);

const loader = new THREE.TextureLoader();
const diffuse = loader.load('assets/hero5/hero_bg_5_diffuse.webp');
const normalMap = loader.load('assets/hero5/hero_bg_5_normal.webp');
const displacementMap = loader.load('assets/hero5/hero_bg_5_displacement.webp');

diffuse.colorSpace = THREE.SRGBColorSpace;
normalMap.colorSpace = THREE.NoColorSpace;
displacementMap.colorSpace = THREE.NoColorSpace;

const aspect = 1920 / 1080;
const planeHeight = 3;
const planeWidth = planeHeight * aspect;

const geometry = new THREE.PlaneGeometry(planeWidth, planeHeight, 240, 135);
const material = new THREE.MeshStandardMaterial({
  map: diffuse,
  normalMap: normalMap,
  normalScale: new THREE.Vector2(2.5, 2.5),
  displacementMap: displacementMap,
  displacementScale: 0.05,
  displacementBias: -0.025,
  roughness: 0.75,
  metalness: 0.0,
});

const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

// Lights
const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

const pointLight = new THREE.PointLight(0xfff8ec, 2.6, 20, 1.4);
pointLight.position.set(0, 0, 1.5);
scene.add(pointLight);

const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
fillLight.position.set(-2, -1, 2);
scene.add(fillLight);

// Mouse-driven light position
const target = { x: 0, y: 0 };
const current = { x: 0, y: 0 };

window.addEventListener('mousemove', (e) => {
  const rect = stage.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  const y = -(((e.clientY - rect.top) / rect.height) * 2 - 1);
  target.x = THREE.MathUtils.clamp(x, -1.5, 1.5);
  target.y = THREE.MathUtils.clamp(y, -1.5, 1.5);
});

function animate() {
  requestAnimationFrame(animate);

  current.x += (target.x - current.x) * 0.08;
  current.y += (target.y - current.y) * 0.08;

  pointLight.position.set(current.x * 2.5, current.y * 2.5, 1.3);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  const w = stage.clientWidth;
  const h = stage.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
</script>
</body>
</html>
